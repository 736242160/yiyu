<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>用户中心 - 见微知心</title>
    <link rel="stylesheet" href="css/common.css?v=2026042901">
    <link rel="stylesheet" href="css/usercenter.css?v=2026042901">
</head>
<body>
    <div class="container">
        <div class="content-top">
            <div class="user-card" id="userCard" onclick="gotoUserEditPage()">
                <div class="user-avatar fallback">
                    <span id="userAvatarText">见</span>
                </div>
                <div class="user-info">
                    <div class="user-name" id="userName">用户名</div>
                    <div class="user-detail" id="userDetail">用户详情</div>
                </div>
            </div>
        </div>
        <div class="content-wrapper">
            <div class="menu-list">
                <div class="menu-item" onclick="gotoMyExperiments()">
                    <div class="menu-icon menu-icon-experiment"></div>
                    <div class="menu-text">我的实验</div>
                    <div class="menu-arrow">›</div>
                </div>
                <div class="menu-item" onclick="gotoHistory()">
                    <div class="menu-icon menu-icon-history"></div>
                    <div class="menu-text">历史记录</div>
                    <div class="menu-arrow">›</div>
                </div>
                <div class="menu-item" onclick="gotoSettings()">
                    <div class="menu-icon menu-icon-settings"></div>
                    <div class="menu-text">设置</div>
                    <div class="menu-arrow">›</div>
                </div>
                <div class="menu-item" onclick="gotoAbout()">
                    <div class="menu-icon menu-icon-about"></div>
                    <div class="menu-text">关于我们</div>
                    <div class="menu-arrow">›</div>
                </div>
            </div>
            <div class="logout-btn" onclick="doLogout()">退出登录</div>
        </div>
    </div>
    <div class="tab-bar">
        <div class="tab-item" onclick="switchTab('home')">
            <img src="images/tabBar/home.png" alt="首页">
        </div>
        <div class="tab-item active" onclick="switchTab('usercenter')">
            <img src="images/tabBar/user.png" alt="用户中心">
        </div>
    </div>
    <script src="js/utils.js?v=2026042901"></script>
    <script src="js/http.js?v=2026042901"></script>
    <script src="js/usercenter.js?v=2026042901"></script>
</body>
</html>
